server:
  port: 8081
spring:
  application:
    name: member-service
  datasource:
    url: ${MEMBER_DB_URL:jdbc:postgresql://localhost:5432/member_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only}
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
resilience4j:
  circuitbreaker:
    instances:
      socialLogin:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
