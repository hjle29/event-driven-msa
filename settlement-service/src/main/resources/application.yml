server:
  port: 8084
spring:
  application:
    name: settlement-service
  datasource:
    url: ${SETTLEMENT_DB_URL:jdbc:postgresql://localhost:5432/settlement_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      retry-backoff-ms: 1000
      enable-idempotence: true
      properties:
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
    consumer:
      group-id: settlement-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hjle.common.event"
        spring.json.value.default.type: "com.hjle.common.event.OrderCreatedEvent"
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30000
        permitted-calls-in-half-open-state: 3
        sliding-window-size: 100
        sliding-window-type: count_based

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 100
        interval-function: exponential-random-backoff

  timelimiter:
    configs:
      default:
        timeout-duration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true

internal:
  secret: ${INTERNAL_SECRET:internal-secret-dev}
